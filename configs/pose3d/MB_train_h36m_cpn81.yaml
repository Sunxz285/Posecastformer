# General
train_2d: False
no_eval: False
finetune: False
partial_train: null

# Training
epochs: 120
checkpoint_frequency: 30
batch_size: 16
dropout: 0.1
learning_rate: 0.0002
weight_decay: 0.0
lr_decay: 0.99

# Model - PoseCASTformer Specific
backbone: PoseCASTformer
ablation_mode: 'full'
maxlen: 81
dim_feat: 512
mlp_ratio: 2
depth: 5
depth_interaction: 3
num_heads: 8
dim_rep: 512

# Data - CPN detection data
data_root: data/motion3d/MB3D_f81s27
subset_list: [H36M-CPN]
dt_file: data_2d_h36m_cpn_ft_h36m_dbb.npz
clip_len: 81
data_stride: 27
rootrel: True
sample_stride: 1
num_joints: 17
no_conf: True
gt_2d: False

# Loss
lambda_3d_velocity: 20
lambda_scale: 0.5
lambda_lv: 0.0
lambda_lg: 0.0
lambda_a: 0.0
lambda_av: 0.0

# Augmentation
synthetic: False
flip: True
mask_ratio: 0.0
mask_T_ratio: 0.0
noise: False