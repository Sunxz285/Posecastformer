# General
train_2d: False
no_eval: False
finetune: False
partial_train: null

# Training
epochs: 120 # Keep consistent 120 epochs as in the paper
checkpoint_frequency: 30
batch_size: 16
dropout: 0.1
learning_rate: 0.0002
weight_decay: 0.
lr_decay: 0.99

# Model - PoseCASTformer Specific
backbone: PoseCASTformer  # Must be consistent with the judgment string in learning.py
ablation_mode: 'full'
maxlen: 243
dim_feat: 512             # Corresponds to embed_dim, recommended to keep 512 for fair comparison (consistent with DSTformer Scratch)
mlp_ratio: 2              # Corresponds to mlp_ratio
depth: 6                  # depth_total
depth_interaction: 3      # PoseCASTformer specific parameter
num_heads: 8
dim_rep: 512              # Used for interface alignment, although not directly named this way inside PoseCASTformer, kept consistent

# Data (Keep unchanged, ensure data consistency)
data_root: data/motion3d/MB3D_f243s81/
subset_list: [H36M-SH]
dt_file: h36m_sh_conf_cam_source_final.pkl
clip_len: 243
data_stride: 81
rootrel: True
sample_stride: 1
num_joints: 17
no_conf: False  # Use (x, y, conf) 3-channel input
gt_2d: False

# Loss (Keep unchanged, use framework built-in Loss)
lambda_3d_velocity: 20
lambda_scale: 0.5
lambda_lv: 0.0
lambda_lg: 0.0
lambda_a: 0.0
lambda_av: 0.0

# Augmentation (Keep unchanged)
synthetic: False
flip: True
mask_ratio: 0.
mask_T_ratio: 0.
noise: False
